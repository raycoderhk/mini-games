<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 營養師 App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .title { font-size: 2.5em; color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.1em; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
        .upload-icon { font-size: 4em; margin-bottom: 20px; }
        .upload-text { font-size: 1.2em; color: #666; }
        #fileInput { display: none; }
        .preview { max-width: 100%; max-height: 300px; border-radius: 10px; margin: 20px 0; display: none; }
        .preview.active { display: block; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9ff;
            border-radius: 15px;
            display: none;
        }
        .result.active { display: block; }
        .loading { text-align: center; padding: 40px; display: none; }
        .loading.active { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🥗 營養師 App</h1>
            <p class="subtitle">AI 食物識別 + 營養分析</p>
        </div>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <div class="upload-text">點擊上傳食物圖片</div>
            <div style="color: #999; margin-top: 10px;">支援 JPG, PNG, WebP</div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>
        <img id="preview" class="preview" alt="預覽">
        <div style="text-align: center;">
            <button class="btn" id="analyzeBtn" onclick="analyzeImage()" disabled>🔍 開始分析</button>
        </div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在分析食物...</div>
        </div>
        <div class="result" id="result">
            <h3>🍽️ 識別結果</h3>
            <ul id="foodList"></ul>
        </div>
    </div>
    <script>
        let selectedFile = null;
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').classList.add('active');
                };
                reader.readAsDataURL(file);
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        async function analyzeImage() {
            if (!selectedFile) return;
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                // Convert file to base64
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const imageData = e.target.result;
                    
                    // Call backend API
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // Display food recognition results
                        document.getElementById('foodList').innerHTML = result.foods.map(f => `<li>🍽️ ${f}</li>`).join('');
                        
                        // Add nutrition analysis if available
                        if (result.nutrition && result.nutrition.data) {
                            const nutritionDiv = document.createElement('div');
                            nutritionDiv.style.marginTop = '20px';
                            nutritionDiv.innerHTML = '<h3>📊 營養分析</h3><pre style="white-space: pre-wrap; font-family: inherit;">' + 
                                JSON.stringify(result.nutrition.data, null, 2) + '</pre>';
                            document.getElementById('result').appendChild(nutritionDiv);
                        }
                    } else {
                        document.getElementById('foodList').innerHTML = `<li style="color: red;">❌ ${result.error || '分析失敗'}</li>`;
                    }
                    
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('result').classList.add('active');
                    document.getElementById('analyzeBtn').disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            } catch (error) {
                document.getElementById('foodList').innerHTML = `<li style="color: red;">❌ 錯誤：${error.message}</li>`;
                document.getElementById('loading').classList.remove('active');
                document.getElementById('result').classList.add('active');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
