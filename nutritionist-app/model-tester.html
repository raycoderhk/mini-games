<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Multi-Model Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        /* Content */
        .content { display: none; padding: 30px; }
        .content.active { display: block; }
        
        /* Login */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            padding: 50px;
        }
        .login-card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 { color: #667eea; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e5ff; border-radius: 8px; font-size: 1em; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .alert-error { background: #fee; color: #c00; }
        .alert-success { background: #efe; color: #060; }
        
        /* Nav */
        .nav { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .nav-btn {
            padding: 12px 24px;
            background: #f8f9ff;
            border: 2px solid #e0e5ff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
        }
        .nav-btn:hover { background: #eef1ff; }
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        /* Section */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Card */
        .card { background: #f8f9ff; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 1.3em; color: #667eea; margin-bottom: 15px; }
        
        /* Model Grid */
        .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .model-card {
            background: white;
            border: 2px solid #e0e5ff;
            border-radius: 10px;
            padding: 15px;
        }
        .model-card.success { border-color: #4c4; }
        .model-card.error { border-color: #c44; }
        .model-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .model-name { font-weight: 600; color: #333; }
        .model-provider { font-size: 0.85em; color: #888; }
        .model-status { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
        .model-status.success { background: #efe; color: #060; }
        .model-status.error { background: #fee; color: #c00; }
        .model-status.pending { background: #ffe; color: #660; }
        .model-result {
            background: #f5f5f5;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .model-error { color: #c00; font-size: 0.85em; }
        .model-meta { font-size: 0.8em; color: #888; margin-top: 8px; }
        
        /* Test Controls */
        .test-controls { margin-bottom: 20px; }
        .test-prompt { width: 100%; padding: 12px; border: 2px solid #e0e5ff; border-radius: 8px; margin-bottom: 10px; }
        .test-prompt:focus { border-color: #667eea; outline: none; }
        
        /* Image Upload */
        .image-preview { max-width: 200px; margin-top: 10px; border-radius: 8px; }
        
        /* Running indicator */
        .running { display: inline-block; width: 20px; height: 20px; border: 3px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Multi-Model Tester</h1>
            <p>測試不同 AI 模型 - 文本理解、圖像理解、圖像生成</p>
        </div>
        
        <!-- Login -->
        <div id="loginScreen" class="login-screen">
            <div class="login-card">
                <h2>🔐 管理員登錄</h2>
                <div id="loginError" class="alert alert-error" style="display:none;"></div>
                <div class="form-group">
                    <label>管理員密碼</label>
                    <input type="password" id="adminPassword" placeholder="輸入密碼" onkeypress="if(event.key==='Enter')login()">
                </div>
                <button class="btn" onclick="login()">登錄</button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div id="mainContent" class="content">
            <!-- Nav -->
            <div class="nav">
                <button class="nav-btn active" onclick="showSection('text')">📝 文本理解</button>
                <button class="nav-btn" onclick="showSection('vision')">🖼️ 圖像理解</button>
                <button class="nav-btn" onclick="showSection('image')">🎨 圖像生成</button>
                <button class="nav-btn" onclick="logout()" style="margin-left:auto;">🚪 登出</button>
            </div>
            
            <!-- Text Section -->
            <div id="textSection" class="section active">
                <div class="card">
                    <div class="card-title">📝 文本理解測試</div>
                    <div class="test-controls">
                        <select id="textPrompt" class="test-prompt" style="margin-bottom:10px;">
                            <option value="">-- 選擇測試 Prompt --</option>
                        </select>
                        <textarea id="customPrompt" class="test-prompt" rows="2" placeholder="或輸入自定義 Prompt..."></textarea>
                        <button class="btn" onclick="runTextTest()" style="width:auto;display:inline-block;">
                            ▶️ 運行測試
                        </button>
                    </div>
                    <div id="textResults" class="model-grid"></div>
                </div>
            </div>
            
            <!-- Vision Section -->
            <div id="visionSection" class="section">
                <div class="card">
                    <div class="card-title">🖼️ 圖像理解測試</div>
                    <div class="test-controls">
                        <input type="file" id="visionImage" accept="image/*" onchange="previewImage(this, 'visionPreview')">
                        <img id="visionPreview" class="image-preview" style="display:none;">
                        <textarea id="visionPrompt" class="test-prompt" rows="2" placeholder="描述這張圖片...">請描述這張食物圖片的內容，包括食物種類、顏色、擺盤等</textarea>
                        <button class="btn" onclick="runVisionTest()" style="width:auto;display:inline-block;">
                            ▶️ 運行測試
                        </button>
                    </div>
                    <div id="visionResults" class="model-grid"></div>
                </div>
            </div>
            
            <!-- Image Section -->
            <div id="imageSection" class="section">
                <div class="card">
                    <div class="card-title">🎨 圖像生成測試</div>
                    <div class="test-controls">
                        <textarea id="imagePrompt" class="test-prompt" rows="2" placeholder="輸入你想生成的圖像描述...">一隻可愛的小熊在森林裡吃蜂蜜</textarea>
                        <button class="btn" onclick="runImageTest()" style="width:auto;display:inline-block;">
                            ▶️ 運行測試
                        </button>
                    </div>
                    <div id="imageResults" class="model-grid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let authToken = localStorage.getItem('admin_token');
        
        // Check login on load
        if (authToken) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            loadPrompts();
        }
        
        async function login() {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('admin_token', authToken);
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContent').classList.add('active');
                    loadPrompts();
                } else {
                    errorDiv.textContent = data.error || '登錄失敗';
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = '網絡錯誤';
                errorDiv.style.display = 'block';
            }
        }
        
        async function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }
        
        function showSection(name) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(name + 'Section').classList.add('active');
        }
        
        async function loadPrompts() {
            try {
                const res = await fetch('/api/model-test/text-prompts');
                const prompts = await res.json();
                const select = document.getElementById('textPrompt');
                prompts.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.prompt;
                    opt.textContent = p.name + ': ' + p.prompt.substring(0, 30) + '...';
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Failed to load prompts:', e);
            }
        }
        
        async function runTextTest() {
            const prompt = document.getElementById('customPrompt').value || document.getElementById('textPrompt').value;
            if (!prompt) { alert('請輸入 Prompt'); return; }
            await runTest('text', prompt);
        }
        
        async function runVisionTest() {
            const fileInput = document.getElementById('visionImage');
            const prompt = document.getElementById('visionPrompt').value;
            
            if (!fileInput.files[0]) { alert('請上傳圖片'); return; }
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                await runTest('vision', prompt, base64);
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
        
        async function runImageTest() {
            const prompt = document.getElementById('imagePrompt').value;
            if (!prompt) { alert('請輸入 Prompt'); return; }
            await runTest('image', prompt);
        }
        
        async function runTest(type, prompt, image = null) {
            const resultsDiv = document.getElementById(type + 'Results');
            resultsDiv.innerHTML = '<div style="padding:20px;text-align:center;"><span class="running"></span> 運行測試中...</div>';
            
            try {
                const body = { type, prompt };
                if (image) body.image = image;
                
                const response = await fetch('/api/model-test/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    },
                    body: JSON.stringify(body)
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    resultsDiv.innerHTML = '<div class="alert alert-error">錯誤: ' + data.error + '</div>';
                    return;
                }
                
                displayResults(type, data.results);
            } catch (e) {
                resultsDiv.innerHTML = '<div class="alert alert-error">網絡錯誤: ' + e.message + '</div>';
            }
        }
        
        function displayResults(type, results) {
            const container = document.getElementById(type + 'Results');
            container.innerHTML = '';
            
            const results_data = results.results || [];
            
            results_data.forEach(r => {
                const card = document.createElement('div');
                card.className = 'model-card ' + (r.success ? 'success' : 'error');
                
                const status = r.success 
                    ? '<span class="model-status success">成功</span>'
                    : '<span class="model-status error">失敗</span>';
                
                card.innerHTML = `
                    <div class="model-header">
                        <div>
                            <div class="model-name">${r.model_name || r.model}</div>
                            <div class="model-provider">${r.provider || ''}</div>
                        </div>
                        ${status}
                    </div>
                    ${r.success 
                        ? `<div class="model-result">${escapeHtml(r.content || '')}</div>
                           <div class="model-meta">⏱ ${r.response_time || 0}s</div>`
                        : `<div class="model-error">${escapeHtml(r.error || 'Unknown error')}</div>`
                    }
                `;
                container.appendChild(card);
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
