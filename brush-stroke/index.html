<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆觸渲染器 Brush Stroke Renderer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { font-size: 1.5em; margin-bottom: 10px; color: #e0e0e0; }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .controls input[type="file"] { display: none; }
        .controls input[type="range"] { width: 120px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }
        .btn-upload { background: #4a9eff; color: white; }
        .btn-upload:hover { background: #3a8eef; }
        .btn-paint { background: #ff6b6b; color: white; }
        .btn-paint:hover { background: #ff5252; }
        .btn-paint:disabled { background: #555; cursor: not-allowed; }
        .btn-reset { background: #555; color: white; }
        .btn-reset:hover { background: #666; }
        .btn-retry { background: #4caf50; color: white; }
        .btn-retry:hover { background: #45a049; }
        canvas { border: 2px solid #333; border-radius: 8px; max-width: 100%; cursor: crosshair; }
        .info { margin-top: 15px; font-size: 0.9em; color: #888; text-align: center; }
        .progress { font-size: 1.2em; color: #4a9eff; margin: 10px 0; }
        .stats { display: flex; gap: 20px; font-size: 0.85em; color: #666; }
        .setting { display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #aaa; }
        .stats-panel {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            font-size: 1.1em;
            align-items: center;
        }
        .stat-item { color: #aaa; }
        .stat-item span { color: #4a9eff; }
        .vote-btn {
            padding: 8px 16px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .vote-btn:hover { background: #d81b60; }
        .vote-btn:disabled { background: #555; cursor: not-allowed; }
        .vote-btn.voted { background: #ff4081; }
    </style>
</head>
<body>
    <h1>🖌️ 筆觸渲染器 Brush Stroke Renderer</h1>
    
    <div class="controls">
        <label class="btn btn-upload">
            📁 上傳圖片
            <input type="file" id="imageInput" accept="image/*">
        </label>
        <button class="btn btn-paint" id="paintBtn" disabled>▶️ 開始渲染</button>
        <button class="btn btn-reset" id="resetBtn" disabled>🔄 重置</button>
        <button class="btn btn-retry" id="retryBtn" style="display:none;">🔁 重新參數</button>
    </div>
    
    <div class="controls" id="settingsPanel">
        <div class="setting">
            <label>迭代:</label>
            <input type="range" id="iterationsSlider" min="5000" max="50000" step="5000" value="20000">
            <span id="iterationsValue">20000</span>
        </div>
        <div class="setting">
            <label>筆觸:</label>
            <input type="range" id="brushSlider" min="5" max="40" step="5" value="25">
            <span id="brushValue">25</span>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div class="progress" id="progress">0%</div>
    <div class="stats">
        <span id="iterationsDisplay">0 / 20000 iterations</span>
        <span id="fpsDisplay">fps: 0</span>
    </div>
    
    <div class="stats-panel" id="statsPanel" style="display:none;">
        <div class="stat-item">👁️ 觀看: <span id="viewCount">0</span></div>
        <div class="stat-item">❤️ 投票: <span id="voteCount">0</span></div>
        <button class="vote-btn" id="voteBtn">❤️ 投票</button>
    </div>
    
    <div class="info">
        💡 按住滑鼠 / 手指 或 任意鍵 加速渲染
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const imageInput = document.getElementById('imageInput');
        const paintBtn = document.getElementById('paintBtn');
        const resetBtn = document.getElementById('resetBtn');
        const retryBtn = document.getElementById('retryBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const progressEl = document.getElementById('progress');
        const iterationsEl = document.getElementById('iterationsDisplay');
        const fpsEl = document.getElementById('fpsDisplay');
        const iterationsSlider = document.getElementById('iterationsSlider');
        const iterationsValue = document.getElementById('iterationsValue');
        const brushSlider = document.getElementById('brushSlider');
        const brushValue = document.getElementById('brushValue');
        const statsPanel = document.getElementById('statsPanel');
        const viewCountEl = document.getElementById('viewCount');
        const voteCountEl = document.getElementById('voteCount');
        const voteBtn = document.getElementById('voteBtn');

        let targetImg = null;
        let targetCanvas = document.createElement('canvas');
        let targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
        let originalImageData = null;
        
        let TARGET_ITERATIONS = 20000;
        let INITIAL_BRUSH_SIZE = 25;
        const FINAL_BRUSH_SIZE = 1;
        const COLOR_RANDOM_STRENGTH = 8;
        
        let currentIterations = 0;
        let isPainting = false;
        let lastFrameTime = Date.now();
        let frameCount = 0;
        let fps = 0;
        
        // Vote/view tracking
        let currentImageId = null;
        let baseVoteCount = 0;

        // Generate unique ID for image (based on file name + lastModified)
        function getImageId() {
            const file = imageInput.files[0];
            return file ? file.name + '_' + file.lastModified : null;
        }

        // Load stats from localStorage
        function loadStats() {
            const id = getImageId();
            if (!id) return;
            
            const stats = JSON.parse(localStorage.getItem('brushStrokeStats') || '{}');
            const imgStats = stats[id] || { views: 0, voted: false, voteCount: Math.floor(Math.random() * 50) + 10 };
            
            // Increment view
            imgStats.views++;
            stats[id] = imgStats;
            localStorage.setItem('brushStrokeStats', JSON.stringify(stats));
            
            viewCountEl.textContent = imgStats.views;
            voteCountEl.textContent = imgStats.voteCount;
            
            if (imgStats.voted) {
                voteBtn.disabled = true;
                voteBtn.classList.add('voted');
                voteBtn.textContent = '✓ 已投票';
            }
            
            baseVoteCount = imgStats.voteCount;
        }

        // Cast vote
        function castVote() {
            const id = getImageId();
            if (!id) return;
            
            const stats = JSON.parse(localStorage.getItem('brushStrokeStats') || '{}');
            const imgStats = stats[id] || { views: 0, voted: false, voteCount: 0 };
            
            if (imgStats.voted) return; // Already voted
            
            // Vote!
            imgStats.voted = true;
            imgStats.voteCount++;
            stats[id] = imgStats;
            localStorage.setItem('brushStrokeStats', JSON.stringify(stats));
            
            voteCountEl.textContent = imgStats.voteCount;
            voteBtn.disabled = true;
            voteBtn.classList.add('voted');
            voteBtn.textContent = '✓ 已投票';
            
            console.log('Vote recorded for:', id);
        }

        voteBtn.addEventListener('click', castVote);

        iterationsSlider.addEventListener('input', (e) => {
            TARGET_ITERATIONS = parseInt(e.target.value);
            iterationsValue.textContent = TARGET_ITERATIONS;
            iterationsEl.textContent = `${currentIterations.toLocaleString()} / ${TARGET_ITERATIONS.toLocaleString()} iterations`;
        });

        brushSlider.addEventListener('input', (e) => {
            INITIAL_BRUSH_SIZE = parseInt(e.target.value);
            brushValue.textContent = INITIAL_BRUSH_SIZE;
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const img = new Image();
                img.onload = () => {
                    targetImg = img;
                    const maxW = Math.min(window.innerWidth - 40, 900);
                    const scale = maxW / img.width;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    targetCanvas.width = img.width;
                    targetCanvas.height = img.height;
                    targetCtx.drawImage(img, 0, 0, targetCanvas.width, targetCanvas.height);
                    ctx.drawImage(targetCanvas, 0, 0, canvas.width, canvas.height);
                    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    currentIterations = 0;
                    isPainting = false;
                    paintBtn.disabled = false;
                    paintBtn.textContent = '▶️ 開始渲染';
                    resetBtn.disabled = false;
                    retryBtn.style.display = 'none';
                    settingsPanel.style.display = 'flex';
                    statsPanel.style.display = 'flex';
                    loadStats();
                    updateUI();
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        paintBtn.addEventListener('click', () => {
            if (!targetImg) return;
            if (isPainting) {
                isPainting = false;
                paintBtn.textContent = '▶️ 繼續';
            } else {
                isPainting = true;
                paintBtn.textContent = '⏸️ 暫停';
                settingsPanel.style.display = 'none';
                retryBtn.style.display = 'none';
                requestAnimationFrame(paintLoop);
            }
        });

        resetBtn.addEventListener('click', () => {
            if (originalImageData) ctx.putImageData(originalImageData, 0, 0);
            currentIterations = 0;
            isPainting = false;
            paintBtn.textContent = '▶️ 開始渲染';
            settingsPanel.style.display = 'flex';
            retryBtn.style.display = 'none';
            updateUI();
        });

        retryBtn.addEventListener('click', () => {
            if (originalImageData) ctx.putImageData(originalImageData, 0, 0);
            currentIterations = 0;
            isPainting = false;
            paintBtn.textContent = '▶️ 開始渲染';
            settingsPanel.style.display = 'flex';
            retryBtn.style.display = 'none';
            updateUI();
        });

        canvas.addEventListener('mousedown', () => { 
            if (!isPainting && targetImg && currentIterations === 0) {
                isPainting = true;
                paintBtn.textContent = '⏸️ 暫停';
                settingsPanel.style.display = 'none';
                requestAnimationFrame(paintLoop);
            }
        });

        document.addEventListener('keydown', () => {
            if (targetImg && !isPainting && currentIterations === 0) {
                isPainting = true;
                paintBtn.textContent = '⏸️ 暫停';
                settingsPanel.style.display = 'none';
                requestAnimationFrame(paintLoop);
            }
        });

        function paintLoop() {
            if (!isPainting || currentIterations >= TARGET_ITERATIONS) {
                isPainting = false;
                if (currentIterations >= TARGET_ITERATIONS) {
                    paintBtn.textContent = '✅ 完成!';
                    paintBtn.disabled = true;
                    retryBtn.style.display = 'inline-block';
                } else {
                    paintBtn.textContent = '▶️ 繼續';
                }
                return;
            }
            const frameStart = Date.now();
            while (Date.now() - frameStart < 33 && currentIterations < TARGET_ITERATIONS) iterate();
            frameCount++;
            if (frameCount >= 10) {
                fps = Math.round(10000 / (Date.now() - lastFrameTime));
                lastFrameTime = Date.now();
                frameCount = 0;
            }
            updateUI();
            requestAnimationFrame(paintLoop);
        }

        function iterate() {
            if (!targetImg) return;
            const pos = {
                x: Math.floor(Math.random() * (targetCanvas.width - 2)) + 1,
                y: Math.floor(Math.random() * (targetCanvas.height - 2)) + 1
            };
            const progress = currentIterations / TARGET_ITERATIONS;
            const brushSize = Math.ceil(map(Math.pow(1 - progress, 2), 0, 1, INITIAL_BRUSH_SIZE, FINAL_BRUSH_SIZE));
            let sumR = 0, sumG = 0, sumB = 0, count = 0;
            for (let x = Math.max(0, pos.x - brushSize); x < Math.min(pos.x + brushSize, targetCanvas.width); x++) {
                for (let y = Math.max(0, pos.y - brushSize); y < Math.min(pos.y + brushSize, targetCanvas.height); y++) {
                    if (dist(x, y, pos.x, pos.y) <= brushSize) {
                        const d = targetCtx.getImageData(x, y, 1, 1).data;
                        sumR += d[0]; sumG += d[1]; sumB += d[2];
                        count++;
                    }
                }
            }
            sumR /= count; sumG /= count; sumB /= count;
            const cR = (Math.random() - 0.5) * 2 * COLOR_RANDOM_STRENGTH;
            sumR = Math.max(0, Math.min(255, sumR + cR));
            sumG = Math.max(0, Math.min(255, sumG + cR));
            sumB = Math.max(0, Math.min(255, sumB + cR));
            const scaleX = canvas.width / targetCanvas.width;
            const scaleY = canvas.height / targetCanvas.height;
            ctx.fillStyle = `rgb(${Math.round(sumR)},${Math.round(sumG)},${Math.round(sumB)})`;
            ctx.beginPath();
            ctx.arc(pos.x * scaleX, pos.y * scaleY, Math.max(brushSize * scaleX, 1), 0, Math.PI * 2);
            ctx.fill();
            currentIterations++;
        }

        function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
        function map(v, iMin, iMax, oMin, oMax) { return oMin + (oMax-oMin) * (v-iMin) / (iMax-iMin); }
        function updateUI() {
            progressEl.textContent = Math.round((currentIterations/TARGET_ITERATIONS)*100) + '%';
            iterationsEl.textContent = `${currentIterations.toLocaleString()} / ${TARGET_ITERATIONS.toLocaleString()} iterations`;
            fpsEl.textContent = `fps: ${fps}`;
        }
    </script>
</body>
</html>
