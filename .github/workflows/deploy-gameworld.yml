name: 🚀 Deploy to Zeabur - Gameworld

on:
  push:
    branches: [ main ]
    paths:
      - 'games/2048-game/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Gameworld to Zeabur
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Zeabur Deploy Hook
        run: |
          curl -X POST "${{ secrets.ZEABUR_DEPLOY_HOOK }}" \
            -H "Accept: application/vnd.github.v3+json" \
            || echo "Deploy hook triggered or not configured"
        continue-on-error: true
      
      - name: Deployment Message
        run: |
          echo "✅ Code pushed to GitHub!"
          echo "📦 Zeabur will auto-deploy (check dashboard)"
          echo "🌐 URL: https://gameworld.zeabur.app"
          echo ""
          echo "If auto-deploy fails, manually redeploy at:"
          echo "https://app.zeabur.com/"
