<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aliyun Model Tester - Food Image Analysis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-zone {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .upload-zone:hover {
      background: #f5f7ff;
      border-color: #764ba2;
    }

    .upload-zone.has-image {
      border-style: solid;
      padding: 20px;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      color: #666;
      font-size: 14px;
    }

    #imagePreview {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      margin-top: 16px;
    }

    .model-selector {
      margin-bottom: 16px;
    }

    .model-selector label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      max-height: 300px;
      overflow-y: auto;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .model-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-checkbox:hover {
      background: #f0f0f0;
    }

    .model-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .model-info {
      flex: 1;
    }

    .model-name {
      font-weight: 500;
      font-size: 14px;
      color: #333;
    }

    .model-provider {
      font-size: 12px;
      color: #666;
    }

    .vision-badge {
      display: inline-block;
      padding: 2px 6px;
      background: #667eea;
      color: white;
      border-radius: 4px;
      font-size: 10px;
      margin-left: 6px;
    }

    .prompt-input {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .prompt-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      margin-right: 8px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .results-section {
      margin-top: 20px;
    }

    .result-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #667eea;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    .result-model {
      font-weight: 600;
      font-size: 16px;
      color: #333;
    }

    .result-meta {
      font-size: 12px;
      color: #666;
    }

    .result-content {
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
    }

    .result-error {
      color: #e74c3c;
      font-weight: 500;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #667eea;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-item {
      background: #f8f9fa;
      padding: 12px 16px;
      border-radius: 8px;
      flex: 1;
      min-width: 120px;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .actions-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-toggle input {
      width: 18px;
      height: 18px;
    }

    .filter-toggle label {
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    .comparison-table th,
    .comparison-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    .comparison-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }

    .success-badge {
      display: inline-block;
      padding: 4px 8px;
      background: #10b981;
      color: white;
      border-radius: 4px;
      font-size: 12px;
    }

    .error-badge {
      display: inline-block;
      padding: 4px 8px;
      background: #e74c3c;
      color: white;
      border-radius: 4px;
      font-size: 12px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧪 Aliyun Model Tester</h1>
      <p class="subtitle">Test and compare AI models on food image analysis</p>
    </header>

    <div class="main-grid">
      <!-- Left Panel: Upload & Configuration -->
      <div class="card">
        <h2 class="card-title">📸 Upload Food Image</h2>
        
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">📷</div>
          <div class="upload-text">
            Click to upload or drag and drop<br>
            <small>Supports JPG, PNG, GIF (max 10MB)</small>
          </div>
          <img id="imagePreview" class="hidden" alt="Preview">
        </div>

        <div class="filter-toggle">
          <input type="checkbox" id="visionOnly" checked>
          <label for="visionOnly">Show vision models only (when image uploaded)</label>
        </div>

        <div class="model-selector">
          <label>Select Models to Test:</label>
          <div class="model-grid" id="modelGrid">
            <!-- Models will be loaded here -->
          </div>
        </div>

        <label style="display: block; font-size: 14px; font-weight: 500; color: #555; margin-bottom: 8px;">
          Custom Prompt (optional):
        </label>
        <textarea 
          class="prompt-input" 
          id="promptInput"
          placeholder="Analyze this food image and provide nutritional information including estimated calories, macronutrients (protein, carbs, fat), and key vitamins/minerals."
        ></textarea>

        <div class="actions-bar">
          <button class="btn btn-secondary" onclick="selectAll()">Select All</button>
          <button class="btn btn-secondary" onclick="deselectAll()">Deselect All</button>
        </div>

        <button class="btn btn-primary" id="testBtn" onclick="runTests()" disabled>
          🚀 Run Tests
        </button>
      </div>

      <!-- Right Panel: Results -->
      <div class="card">
        <h2 class="card-title">📊 Results</h2>

        <div id="resultsContent">
          <p style="color: #666; text-align: center; padding: 40px;">
            Upload an image and select models to see comparison results
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let uploadedImage = null;
    let availableModels = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadModels();
      setupUploadZone();
    });

    // Load available models
    async function loadModels() {
      try {
        const response = await fetch('/api/models?vision=true');
        const data = await response.json();
        availableModels = data.models;
        renderModelGrid(availableModels);
      } catch (error) {
        console.error('Failed to load models:', error);
        showError('Failed to load models');
      }
    }

    // Render model selection grid
    function renderModelGrid(models) {
      const grid = document.getElementById('modelGrid');
      grid.innerHTML = models.map(model => `
        <label class="model-checkbox">
          <input type="checkbox" value="${model.id}" ${model.vision ? 'checked' : ''}>
          <div class="model-info">
            <div class="model-name">
              ${model.name}
              ${model.vision ? '<span class="vision-badge">👁️ Vision</span>' : ''}
            </div>
            <div class="model-provider">${model.provider}</div>
          </div>
        </label>
      `).join('');
    }

    // Setup upload zone
    function setupUploadZone() {
      const zone = document.getElementById('uploadZone');
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.style.display = 'none';
      zone.appendChild(input);

      zone.addEventListener('click', () => input.click());

      input.addEventListener('change', (e) => {
        if (e.target.files[0]) {
          handleImageUpload(e.target.files[0]);
        }
      });

      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.style.background = '#f5f7ff';
      });

      zone.addEventListener('dragleave', () => {
        zone.style.background = '';
      });

      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.style.background = '';
        if (e.dataTransfer.files[0]) {
          handleImageUpload(e.dataTransfer.files[0]);
        }
      });
    }

    // Handle image upload
    async function handleImageUpload(file) {
      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        
        if (data.success) {
          uploadedImage = data;
          
          // Show preview
          const preview = document.getElementById('imagePreview');
          const uploadText = document.querySelector('.upload-text');
          const icon = document.querySelector('.upload-icon');
          
          preview.src = URL.createObjectURL(file);
          preview.classList.remove('hidden');
          icon.classList.add('hidden');
          uploadText.classList.add('hidden');
          document.getElementById('uploadZone').classList.add('has-image');

          // Enable test button
          document.getElementById('testBtn').disabled = false;

          // Update model filter
          updateModelFilter();
        }
      } catch (error) {
        console.error('Upload failed:', error);
        showError('Failed to upload image');
      }
    }

    // Update model filter based on checkbox
    async function updateModelFilter() {
      const visionOnly = document.getElementById('visionOnly').checked;
      const hasImage = uploadedImage !== null;

      if (hasImage && visionOnly) {
        const response = await fetch('/api/models?vision=true');
        const data = await response.json();
        availableModels = data.models;
        renderModelGrid(availableModels);
      } else {
        const response = await fetch('/api/models');
        const data = await response.json();
        availableModels = data.models;
        renderModelGrid(availableModels);
      }
    }

    document.getElementById('visionOnly').addEventListener('change', updateModelFilter);

    // Select/Deselect all
    function selectAll() {
      document.querySelectorAll('#modelGrid input[type="checkbox"]').forEach(cb => {
        cb.checked = true;
      });
    }

    function deselectAll() {
      document.querySelectorAll('#modelGrid input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });
    }

    // Run tests
    async function runTests() {
      const selectedModels = Array.from(
        document.querySelectorAll('#modelGrid input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      if (selectedModels.length === 0) {
        showError('Please select at least one model');
        return;
      }

      if (!uploadedImage) {
        showError('Please upload an image first');
        return;
      }

      const prompt = document.getElementById('promptInput').value || 
        'Analyze this food image and provide nutritional information including estimated calories, macronutrients (protein, carbs, fat), and key vitamins/minerals.';

      // Show loading state
      const resultsContent = document.getElementById('resultsContent');
      resultsContent.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <span>Testing ${selectedModels.length} model(s)... This may take a minute.</span>
        </div>
      `;

      document.getElementById('testBtn').disabled = true;

      try {
        const formData = new FormData();
        const fileInput = document.querySelector('input[type="file"]');
        formData.append('image', fileInput.files[0]);
        formData.append('models', JSON.stringify(selectedModels));
        formData.append('prompt', prompt);

        const response = await fetch('/api/test-batch', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        displayResults(data.results);

      } catch (error) {
        console.error('Test failed:', error);
        showError('Failed to run tests: ' + error.message);
      } finally {
        document.getElementById('testBtn').disabled = false;
      }
    }

    // Display results
    function displayResults(results) {
      const resultsContent = document.getElementById('resultsContent');
      
      const successful = results.filter(r => r.success);
      const failed = results.filter(r => !r.success);

      let html = `
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-label">Total Models</div>
            <div class="stat-value">${results.length}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Successful</div>
            <div class="stat-value" style="color: #10b981;">${successful.length}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Failed</div>
            <div class="stat-value" style="color: #e74c3c;">${failed.length}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Avg Latency</div>
            <div class="stat-value">${successful.length ? Math.round(successful.reduce((a,b) => a + b.latency, 0) / successful.length) : 0}ms</div>
          </div>
        </div>
      `;

      // Comparison table
      if (successful.length > 1) {
        html += `
          <h3 style="margin: 20px 0 12px; font-size: 16px;">⚡ Performance Comparison</h3>
          <table class="comparison-table">
            <thead>
              <tr>
                <th>Model</th>
                <th>Status</th>
                <th>Latency</th>
                <th>Tokens</th>
              </tr>
            </thead>
            <tbody>
              ${results.map(r => `
                <tr>
                  <td><strong>${r.modelName}</strong></td>
                  <td>${r.success ? '<span class="success-badge">✅ Success</span>' : '<span class="error-badge">❌ Failed</span>'}</td>
                  <td>${r.latency}ms</td>
                  <td>${r.usage ? `${r.usage.total_tokens}` : '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      // Individual results
      html += `<h3 style="margin: 20px 0 12px; font-size: 16px;">📝 Detailed Results</h3>`;
      
      results.forEach(result => {
        html += `
          <div class="result-card" style="border-left-color: ${result.success ? '#667eea' : '#e74c3c'}">
            <div class="result-header">
              <div>
                <div class="result-model">${result.modelName}</div>
                <div class="result-meta">${result.model} • ${new Date(result.timestamp).toLocaleTimeString()}</div>
              </div>
              <div>
                ${result.success ? 
                  `<span class="success-badge">✅ Success</span>` : 
                  `<span class="error-badge">❌ Failed</span>`
                }
              </div>
            </div>
            
            ${result.success ? `
              <div class="result-content">${result.response}</div>
              ${result.usage ? `
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #666;">
                  <strong>Usage:</strong> ${result.usage.prompt_tokens} input + ${result.usage.completion_tokens} output = ${result.usage.total_tokens} total tokens
                </div>
              ` : ''}
            ` : `
              <div class="result-content result-error">${result.error}</div>
            `}
            
            <div style="margin-top: 8px; font-size: 12px; color: #999;">
              ⏱️ Latency: ${result.latency}ms
            </div>
          </div>
        `;
      });

      resultsContent.innerHTML = html;
    }

    // Show error
    function showError(message) {
      const resultsContent = document.getElementById('resultsContent');
      resultsContent.innerHTML = `
        <div class="result-card" style="border-left-color: #e74c3c">
          <div class="result-content result-error">❌ ${message}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
