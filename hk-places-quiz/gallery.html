<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 香港地標圖庫 | HK Places Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.95em; }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
        }
        .filters {
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255,255,255,0.03);
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); }
        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
        }
        .audio-filters {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .audio-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: #aaa;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .audio-btn.active { background: #764ba2; border-color: #764ba2; color: #fff; }
        .sort-bar {
            padding: 10px 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            color: #888;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery-item {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .gallery-image-container {
            position: relative;
            overflow: hidden;
        }
        .gallery-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .gallery-image:hover { transform: scale(1.05); }
        .ink-toggle-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .gallery-image-container:hover .ink-toggle-btn { opacity: 1; }
        .gallery-info { padding: 15px; }
        .gallery-name { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        .gallery-category {
            display: inline-block;
            padding: 3px 10px;
            background: #667eea;
            border-radius: 12px;
            font-size: 0.75em;
            margin-bottom: 8px;
        }
        .gallery-location { font-size: 0.85em; color: #888; margin-bottom: 5px; }
        .gallery-date { font-size: 0.8em; color: #666; margin-bottom: 10px; }
        .gallery-stats {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }
        .gallery-stat { display: flex; align-items: center; gap: 4px; }
        .gallery-stat span { color: #667eea; }
        .action-section { display: flex; gap: 8px; flex-wrap: wrap; }
        .vote-btn {
            padding: 8px 16px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .vote-btn:hover { background: #d81b60; }
        .vote-btn:disabled { background: #444; cursor: not-allowed; }
        .vote-btn.voted { background: #ff4081; }
        .vote-count { display: flex; align-items: center; font-size: 0.85em; color: #e91e63; }
        .vote-count.voted { color: #ff4081; }
        .details-btn {
            padding: 8px 16px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .audio-btn-item {
            padding: 8px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.show { display: flex; }
        .modal img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
        }
        .details-modal .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
        }
        .details-modal h2 { color: #667eea; margin-bottom: 15px; }
        .details-modal p { margin-bottom: 15px; line-height: 1.6; }
        .details-modal ul { margin: 10px 0; padding-left: 20px; }
        .details-modal li { margin-bottom: 5px; }
        .details-modal .history { background: rgba(102,126,234,0.1); padding: 10px; border-radius: 8px; margin: 10px 0; }
        .details-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5em;
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
        }
        .top-ranked {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 15px;
            margin: 15px;
        }
        .top-ranked h3 { color: #667eea; margin-bottom: 10px; font-size: 1em; }
        .top-list { display: flex; flex-direction: column; gap: 8px; }
        .top-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.9em;
        }
        .top-item .name { flex: 1; }
        .top-item .count { color: #e91e63; font-weight: bold; margin-left: 10px; }
        .top-item.view-item .count { color: #667eea; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 香港地標圖庫 | HK Places Gallery</h1>
        <p>探索香港各地標嘅靚相同故事</p>
    </div>
    
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-number" id="total-landmarks">0</div>
            <div class="stat-label">地標總數</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="total-views">0</div>
            <div class="stat-label">總瀏覽次數</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="total-votes">0</div>
            <div class="stat-label">總投票次數</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="top-voted">-</div>
            <div class="stat-label">人氣王</div>
        </div>
    </div>
    
    <div class="top-ranked">
        <h3>🏆 你嘅統計 (本地儲存)</h3>
        <div class="top-list" id="your-stats">
            <div class="top-item view-item">
                <span class="name">👁️ 最多瀏覽</span>
                <span class="count" id="your-most-viewed">-</span>
            </div>
            <div class="top-item">
                <span class="name">❤️ 最多投票</span>
                <span class="count" id="your-most-liked">-</span>
            </div>
        </div>
    </div>
    
    <div class="filters" id="category-filters"></div>
    <div class="audio-filters">
        <button class="audio-btn active" data-filter="all">🎵 全部地標</button>
        <button class="audio-btn" data-filter="with_audio">🎤 有語音導航</button>
        <button class="audio-btn" data-filter="without_audio">🔇 未有語音</button>
    </div>
    <div class="sort-bar">
        <span>🔀 排序：</span>
        <button class="filter-btn active" data-sort="date_desc">📅 日期 (新→舊)</button>
        <button class="filter-btn" data-sort="date_asc">📅 日期 (舊→新)</button>
        <button class="filter-btn" data-sort="votes_desc">🔥 人氣 (高→低)</button>
        <button class="filter-btn" data-sort="votes_asc">🔥 人氣 (低→高)</button>
        <button class="filter-btn" data-sort="name_asc">🔤 名稱 (A→Z)</button>
    </div>
    
    <div class="gallery-grid" id="gallery-grid"></div>
    
    <div class="modal" id="image-modal" onclick="closeImageModal(event)">
        <button class="modal-close" onclick="closeImageModal()">&times;</button>
        <img id="image-modal-content" src="">
    </div>
    
    <div class="modal details-modal" id="details-modal">
        <button class="details-close" onclick="closeDetailsModal()">&times;</button>
        <div class="modal-content" id="details-content"></div>
    </div>

    <script>
        let galleryData = [];
        let currentFilter = 'all';
        let currentAudioFilter = 'all';
        let currentSort = 'date_desc';
        let currentAudio = null;
        let currentAudioId = null;
        
        // ============ FINGERPRINT + STORAGE ============
        const STORAGE_KEY = 'hkplaces_votes';
        const VOTES_PER_PLACE = 1;
        const COOLDOWN_HOURS = 24;
        
        // Simple fingerprint (browser characteristics)
        function getFingerprint() {
            const fp = [
                navigator.userAgent,
                navigator.language,
                screen.width,
                screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset()
            ].join('|');
            let hash = 0;
            for (let i = 0; i < fp.length; i++) {
                const char = fp.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'fp_' + Math.abs(hash).toString(36);
        }
        
        function getUserId() {
            let uid = localStorage.getItem('hkplaces_uid');
            if (!uid) {
                uid = getFingerprint();
                localStorage.setItem('hkplaces_uid', uid);
            }
            return uid;
        }
        
        function getAllVotes() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        }
        
        function saveAllVotes(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function canVote(placeId) {
            const votes = getAllVotes();
            const userId = getUserId();
            const placeVotes = votes[placeId] || {};
            const userVote = placeVotes[userId];
            
            if (!userVote) return true;
            
            const lastVote = userVote.lastVote;
            const hoursSince = (Date.now() - lastVote) / (1000 * 60 * 60);
            return hoursSince >= COOLDOWN_HOURS;
        }
        
        function getCooldownRemaining(placeId) {
            const votes = getAllVotes();
            const userId = getUserId();
            const placeVotes = votes[placeId] || {};
            const userVote = placeVotes[userId];
            
            if (!userVote) return 0;
            
            const lastVote = userVote.lastVote;
            const hoursSince = (Date.now() - lastVote) / (1000 * 60 * 60);
            const remaining = COOLDOWN_HOURS - hoursSince;
            return remaining > 0 ? remaining : 0;
        }
        
        function castVote(placeId, placeName) {
            if (!canVote(placeId)) {
                const remaining = getCooldownRemaining(placeId);
                alert(`你需要等 ${Math.ceil(remaining)} 小時後才能再為「${placeName}」投票`);
                return false;
            }
            
            const votes = getAllVotes();
            const userId = getUserId();
            
            if (!votes[placeId]) votes[placeId] = {};
            votes[placeId][userId] = {
                lastVote: Date.now(),
                count: (votes[placeId][userId]?.count || 0) + 1
            };
            
            saveAllVotes(votes);
            return true;
        }
        
        function getVoteCount(placeId) {
            const votes = getAllVotes();
            if (!votes[placeId]) return 0;
            let total = 0;
            for (const uid in votes[placeId]) {
                total += votes[placeId][uid].count || 0;
            }
            return total;
        }
        
        function getUserVoteCount(placeId) {
            const votes = getAllVotes();
            const userId = getUserId();
            return votes[placeId]?.[userId]?.count || 0;
        }
        
        function getTotalViews(placeId) {
            const views = JSON.parse(localStorage.getItem('hkplaces_views') || '{}');
            return views[placeId] || 0;
        }
        
        function incrementViews(placeId) {
            const views = JSON.parse(localStorage.getItem('hkplaces_views') || '{}');
            views[placeId] = (views[placeId] || 0) + 1;
            localStorage.setItem('hkplaces_views', JSON.stringify(views));
        }
        
        function getYourMostViewed() {
            const views = JSON.parse(localStorage.getItem('hkplaces_views') || '{}');
            let maxViews = 0, maxPlace = '-';
            for (const placeId in views) {
                if (views[placeId] > maxViews) {
                    maxViews = views[placeId];
                    const place = galleryData.find(q => q.id == placeId);
                    maxPlace = place?.correctAnswer || maxPlace;
                }
            }
            return maxViews > 0 ? `${maxPlace} (${maxViews})` : '-';
        }
        
        function getYourMostLiked() {
            const votes = getAllVotes();
            let maxVotes = 0, maxPlace = '-';
            for (const placeId in votes) {
                const total = getVoteCount(placeId);
                if (total > maxVotes) {
                    maxVotes = total;
                    const place = galleryData.find(q => q.id == placeId);
                    maxPlace = place?.correctAnswer || maxPlace;
                }
            }
            return maxVotes > 0 ? `${maxPlace} (${maxVotes})` : '-';
        }
        
        // ============ GALLERY ============
        async function loadGalleryData() {
            try {
                const cacheBuster = 'v=' + Date.now() + Math.random().toString(36).substring(7);
                const response = await fetch('quiz-data.json?' + cacheBuster);
                const data = await response.json();
                galleryData = data.questions;
                populateCategoryFilters();
                renderGallery();
                updateStats();
                updateYourStats();
            } catch (error) {
                console.error('Failed to load gallery data:', error);
            }
        }
        
        function populateCategoryFilters() {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(galleryData.map(q => q.category))];
            container.innerHTML = `
                <button class="filter-btn active" data-category="all">全部類別</button>
                ${categories.map(c => `<button class="filter-btn" data-category="${c}">${c}</button>`).join('')}
            `;
            
            container.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentFilter = btn.dataset.category;
                    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGallery();
                });
            });
        }
        
        document.querySelectorAll('.audio-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentAudioFilter = btn.dataset.filter;
                document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery();
            });
        });
        
        document.querySelectorAll('.sort-bar .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSort = btn.dataset.sort;
                document.querySelectorAll('.sort-bar .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery();
            });
        });
        
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            let filtered = galleryData;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(q => q.category === currentFilter);
            }
            
            if (currentAudioFilter === 'with_audio') {
                filtered = filtered.filter(q => q.audio);
            } else if (currentAudioFilter === 'without_audio') {
                filtered = filtered.filter(q => !q.audio);
            }
            
            // Sort
            switch (currentSort) {
                case 'date_desc': filtered.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded)); break;
                case 'date_asc': filtered.sort((a, b) => new Date(a.dateAdded) - new Date(b.dateAdded)); break;
                case 'votes_desc': filtered.sort((a, b) => getVoteCount(a.id) - getVoteCount(b.id)); break;
                case 'votes_asc': filtered.sort((a, b) => getVoteCount(b.id) - getVoteCount(a.id)); break;
                case 'name_asc': filtered.sort((a, b) => a.correctAnswer.localeCompare(b.correctAnswer, 'zh-HK')); break;
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">暫時冇符合篩選條件的地點</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(q => {
                const voteCount = getVoteCount(q.id);
                const views = getTotalViews(q.id);
                const userVoted = getUserVoteCount(q.id) > 0;
                const cooldown = getCooldownRemaining(q.id);
                const canVoteNow = canVote(q.id);
                
                return `
                <div class="gallery-item">
                    <div class="gallery-image-container">
                        <img src="${q.image}" alt="${q.correctAnswer}" class="gallery-image" onclick="openImageModal(this.src)">
                        ${q.inkImage || q.sketchImage ? `<button class="ink-toggle-btn" data-original="${q.image}" data-ink="${q.inkImage || ''}" data-sketch="${q.sketchImage || ''}" data-current="original" onclick="toggleImageStyle(this, event)">🖌️ 水墨畫</button>` : ''}
                    </div>
                    <div class="gallery-info">
                        <div class="gallery-name">${q.correctAnswer}</div>
                        <div class="gallery-category">${q.category}</div>
                        <div class="gallery-location">📍 ${q.extra?.location || '位置不詳'}</div>
                        <div class="gallery-date">📅 加入日期：${formatDate(q.dateAdded)}</div>
                        <div class="gallery-stats">
                            <div class="gallery-stat">👁️ <span>${views}</span></div>
                            <div class="gallery-stat">❤️ <span>${voteCount}</span></div>
                        </div>
                        <div class="action-section">
                            <button class="vote-btn ${userVoted ? 'voted' : ''}" 
                                    onclick="handleVote(${q.id}, '${q.correctAnswer.replace(/'/g, "\\'")}', this)" 
                                    ${!canVoteNow ? 'disabled' : ''}>
                                ${userVoted ? '✓ 已投票' : cooldown > 0 ? `⏳ ${Math.ceil(cooldown)}h` : '❤️ 投票'}
                            </button>
                            <span class="vote-count ${userVoted ? 'voted' : ''}">${voteCount} 票</span>
                            <button class="details-btn" onclick="showDetails(${q.id})">📋 詳情</button>
                            ${q.audio ? `<button class="audio-btn-item" data-audio-id="${q.id}" onclick="playAudio(${q.id})">🎤 語音</button>` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            
            document.getElementById('total-landmarks').textContent = filtered.length;
        }
        
        function handleVote(placeId, placeName, btn) {
            if (castVote(placeId, placeName)) {
                btn.classList.add('voted');
                btn.disabled = true;
                btn.textContent = '✓ 已投票';
                btn.nextElementSibling.textContent = getVoteCount(placeId) + ' 票';
                btn.nextElementSibling.classList.add('voted');
                updateStats();
                updateYourStats();
            }
        }
        
        function toggleImageStyle(btn, event) {
            event.stopPropagation();
            const container = btn.parentElement;
            const img = container.querySelector('img');
            const hasSketch = btn.dataset.sketch && btn.dataset.sketch !== 'undefined';
            const hasInk = btn.dataset.ink && btn.dataset.ink !== 'undefined';
            
            let current = btn.dataset.current || 'original';
            
            if (current === 'original' && hasInk) {
                img.src = btn.dataset.ink;
                btn.dataset.current = 'ink';
                btn.textContent = '✏️ 素描';
            } else if (current === 'original' && hasSketch) {
                img.src = btn.dataset.sketch;
                btn.dataset.current = 'sketch';
                btn.textContent = '🖌️ 水墨畫';
            } else if (current === 'ink' && hasSketch) {
                img.src = btn.dataset.sketch;
                btn.dataset.current = 'sketch';
                btn.textContent = '📷 原本';
            } else if (current === 'ink' && !hasSketch) {
                img.src = btn.dataset.original;
                btn.dataset.current = 'original';
                btn.textContent = '🖌️ 水墨畫';
            } else if (current === 'sketch' && hasInk) {
                img.src = btn.dataset.ink;
                btn.dataset.current = 'ink';
                btn.textContent = '📷 原本';
            } else {
                img.src = btn.dataset.original;
                btn.dataset.current = 'original';
                btn.textContent = '🖌️ 水墨畫';
            }
        }
        
        function updateStats() {
            const totalVotes = galleryData.reduce((sum, q) => sum + getVoteCount(q.id), 0);
            const totalViews = galleryData.reduce((sum, q) => sum + getTotalViews(q.id), 0);
            
            let topPlace = galleryData.reduce((max, q) => {
                const votes = getVoteCount(q.id);
                const maxVotes = getVoteCount(max?.id || 0);
                return votes > maxVotes ? q : max;
            }, galleryData[0]);
            
            document.getElementById('total-votes').textContent = totalVotes;
            document.getElementById('total-views').textContent = totalViews;
            document.getElementById('top-voted').textContent = topPlace ? topPlace.correctAnswer : '-';
        }
        
        function updateYourStats() {
            document.getElementById('your-most-viewed').textContent = getYourMostViewed();
            document.getElementById('your-most-liked').textContent = getYourMostLiked();
        }
        
        function openImageModal(imageSrc) {
            incrementViews(imageSrc);
            updateYourStats();
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('image-modal-content');
            modalImg.src = imageSrc;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeImageModal(event) {
            if (!event || event.target.id === 'image-modal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('image-modal');
                modal.classList.remove('show');
                document.body.style.overflow = 'auto';
            }
        }
        
        function showDetails(placeId) {
            const q = galleryData.find(item => item.id === placeId);
            if (!q) return;
            
            incrementViews(placeId);
            updateYourStats();
            
            const content = document.getElementById('details-content');
            content.innerHTML = `
                <h2>${q.correctAnswer}</h2>
                <p><strong>📍 位置：</strong>${q.extra?.location || '位置不詳'}</p>
                ${q.extra?.height ? `<p><strong>📏 高度：</strong>${q.extra.height}</p>` : ''}
                ${q.extra?.features ? `<p><strong>✨ 特點：</strong></p><ul>${q.extra.features.map(f => `<li>${f}</li>`).join('')}</ul>` : ''}
                <div class="history"><p><strong>📖 歷史：</strong>${q.extra?.history || q.fact || '無資料'}</p></div>
                ${q.extra?.organization ? `<p><strong>🏛️ 機構：</strong>${q.extra.organization}</p>` : ''}
            `;
            
            document.getElementById('details-modal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeDetailsModal() {
            document.getElementById('details-modal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
                closeDetailsModal();
            }
        });
        
        function playAudio(placeId) {
            const q = galleryData.find(item => item.id === placeId);
            if (!q || !q.audio) return;
            
            // If same audio is playing, stop it
            if (currentAudioId === placeId && currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
                currentAudioId = null;
                updateAudioButtons();
                return;
            }
            
            // Stop any currently playing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            // Start new audio
            currentAudio = new Audio(q.audio);
            currentAudioId = placeId;
            currentAudio.loop = false;
            
            currentAudio.onended = () => {
                currentAudio = null;
                currentAudioId = null;
                updateAudioButtons();
            };
            
            currentAudio.play();
            updateAudioButtons();
        }
        
        function updateAudioButtons() {
            document.querySelectorAll('.audio-btn-item').forEach(btn => {
                const placeId = parseInt(btn.getAttribute('data-audio-id'));
                if (placeId === currentAudioId) {
                    btn.textContent = '⏹️ 停止';
                    btn.style.background = '#d32f2f';
                } else {
                    btn.textContent = '🎤 語音';
                    btn.style.background = '';
                }
            });
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }
        
        loadGalleryData();
    </script>
</body>
</html>
