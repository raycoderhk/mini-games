<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBite 測驗 - 地緣政治學習平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fas fa-globe-asia me-2"></i>
                <span class="fw-bold">GeoBite</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link active" href="quiz.html">小測驗</a></li>
                    <li class="nav-item"><a class="nav-link" href="daily/wednesday.html">每日一課</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Quiz Container -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Start Screen -->
                <div id="startScreen" class="text-center">
                    <i class="fas fa-brain display-1 text-primary mb-4"></i>
                    <h1 class="h2 text-primary mb-3">地緣政治知識測驗</h1>
                    <p class="text-muted mb-4">測試你對全球地緣政治的認識</p>
                    
                    <div class="card bg-secondary mb-4">
                        <div class="card-body">
                            <h5 class="text-primary mb-3">測驗說明</h5>
                            <ul class="list-unstyled text-start text-muted">
                                <li><i class="fas fa-check text-success me-2"></i>共 5 道选择题</li>
                                <li><i class="fas fa-check text-success me-2"></i>每題 20 分，滿分 100</li>
                                <li><i class="fas fa-check text-success me-2"></i>完成後可查看答案</li>
                            </ul>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary btn-lg" onclick="startQuiz()">
                        <i class="fas fa-play me-2"></i>開始測驗
                    </button>
                </div>

                <!-- Quiz Screen -->
                <div id="quizScreen" class="d-none">
                    <div class="card bg-secondary">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span class="text-primary fw-bold">
                                <i class="fas fa-question-circle me-2"></i>問題 <span id="questionNumber">1</span>/5
                            </span>
                            <span class="badge bg-primary">分數: <span id="score">0</span></span>
                        </div>
                        <div class="card-body">
                            <h4 id="questionText" class="mb-4 text-light"></h4>
                            <div id="optionsContainer" class="d-grid gap-3">
                                <!-- Options will be inserted here -->
                            </div>
                        </div>
                        <div class="card-footer bg-transparent">
                            <button id="nextBtn" class="btn btn-primary d-none" onclick="nextQuestion()">
                                下一題 <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Result Screen -->
                <div id="resultScreen" class="text-center d-none">
                    <div class="card bg-secondary">
                        <div class="card-body py-5">
                            <i id="resultIcon" class="fas fa-trophy display-1 text-warning mb-4"></i>
                            <h2 class="h3 text-primary mb-3">測驗完成！</h2>
                            <p class="display-4 mb-4"><span id="finalScore">0</span>/100</p>
                            <p id="resultMessage" class="text-muted mb-4"></p>
                            
                            <div class="d-flex justify-content-center gap-3 flex-wrap">
                                <button class="btn btn-primary" onclick="restartQuiz()">
                                    <i class="fas fa-redo me-2"></i>再試一次
                                </button>
                                <a href="index.html" class="btn btn-outline-primary">
                                    <i class="fas fa-home me-2"></i>返回首頁
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Answer Review -->
                    <div id="answerReview" class="mt-4 text-start">
                        <!-- Answers will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            {
                question: "全球製造業中心經歷過多次轉移，請問順序係乜嘢？",
                options: [
                    "英國 → 美國 → 日本 → 亞洲四小龍 → 中國",
                    "美國 → 英國 → 日本 → 中國 → 亞洲四小龍",
                    "英國 → 日本 → 美國 → 中國 → 亞洲四小龍",
                    "日本 → 英國 → 美國 → 亞洲四小龍 → 中國"
                ],
                correct: 0,
                explanation: "製造業中心轉移順序：英國（工業革命）→ 美國 → 日本 → 亞洲四小龍（香港、台灣、韓國、新加坡）→ 中國"
            },
            {
                question: "邊個國家是全球唯一擁有聯合國產業分類中全部41個工業大類的國家？",
                options: ["美國", "日本", "中國", "德國"],
                correct: 2,
                explanation: "中國是全球唯一擁有聯合國產業分類中全部41個工業大類、207個工業中類、666個工業小類的國家。"
            },
            {
                question: "歐盟對中國採取「三個支柱」策略，請問唔包括邊個？",
                options: ["經濟伙伴", "軍事同盟", "競爭對手", "制度性對手"],
                correct: 1,
                explanation: "歐盟對中國的「三個支柱」策略包括：經濟伙伴、競爭對手、制度性對手，並不包括軍事同盟。"
            },
            {
                question: "PESCO 代表什麼？",
                options: [
                    "歐洲經濟合作組織",
                    "永久結構性合作（防務）",
                    "歐洲太陽能合作計劃",
                    "專業經濟服務委員會"
                ],
                correct: 1,
                explanation: "PESCO (Permanent Structured Cooperation) 是歐盟的永久結構性合作框架，用於加強成員國之間的防務合作。"
            },
            {
                question: "歐盟「戰略自主」(Strategic Autonomy) 的主要目標係乜嘢？",
                options: [
                    "減少對美國軍事保護的依賴，增強自身防務能力",
                    "建立歐元貨幣霸權",
                    "取代北約成為歐洲主要軍事組織",
                    "在科技領域完全自主，拒絕外國投資"
                ],
                correct: 0,
                explanation: "歐盟的「戰略自主」概念旨在減少對美國軍事保護的依賴，增強自身防務能力，包括PESCO、歐洲防務基金等措施。"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let userAnswers = [];

        function startQuiz() {
            document.getElementById('startScreen').classList.add('d-none');
            document.getElementById('quizScreen').classList.remove('d-none');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('score').textContent = score;
            document.getElementById('nextBtn').classList.add('d-none');
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-lg btn-outline-primary text-start p-3';
                btn.innerHTML = `<span class="badge bg-primary me-3">${String.fromCharCode(65 + index)}</span> ${option}`;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });
            
            answered = false;
        }

        function selectAnswer(index) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('#optionsContainer button');
            
            userAnswers.push(index);
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) {
                    btn.classList.remove('btn-outline-primary');
                    btn.classList.add('btn-success');
                } else if (i === index && index !== q.correct) {
                    btn.classList.remove('btn-outline-primary');
                    btn.classList.add('btn-danger');
                }
            });
            
            if (index === q.correct) {
                score += 20;
                document.getElementById('score').textContent = score;
            }
            
            document.getElementById('nextBtn').classList.remove('d-none');
            document.getElementById('nextBtn').textContent = 
                currentQuestion === questions.length - 1 ? '查看結果' : '下一題';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizScreen').classList.add('d-none');
            document.getElementById('resultScreen').classList.remove('d-none');
            document.getElementById('finalScore').textContent = score;
            
            let message = '';
            let icon = '';
            
            if (score >= 80) {
                message = '出色！你對地緣政治有深入理解！';
                icon = 'fa-trophy';
            } else if (score >= 60) {
                message = '做得唔錯！繼續學習！';
                icon = 'fa-thumbs-up';
            } else if (score >= 40) {
                message = '合格啦！建議溫習每日一課。';
                icon = 'fa-book';
            } else {
                message = '加油！建議先睇每日一課再試。';
                icon = 'fa-book-reader';
            }
            
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultIcon').className = `fas display-1 ${icon} text-warning mb-4`;
            
            // Show answer review
            const reviewContainer = document.getElementById('answerReview');
            reviewContainer.innerHTML = '<h4 class="text-primary mb-3"><i class="fas fa-check-circle me-2"></i>答案解析</h4>';
            
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.correct;
                const div = document.createElement('div');
                div.className = `card mb-3 ${isCorrect ? 'border-success' : 'border-danger'}`;
                div.innerHTML = `
                    <div class="card-header d-flex align-items-center">
                        <span class="badge ${isCorrect ? 'bg-success' : 'bg-danger'} me-2">${i + 1}</span>
                        <span>${isCorrect ? '<i class="fas fa-check text-success"></i> 正確' : '<i class="fas fa-times text-danger"></i> 錯誤'}</span>
                    </div>
                    <div class="card-body">
                        <p class="mb-2"><strong>${q.question}</strong></p>
                        <p class="mb-1 text-muted small">你的答案: ${q.options[userAnswers[i]] || '未回答'}</p>
                        <p class="mb-0 text-success small"><i class="fas fa-lightbulb me-1"></i>${q.explanation}</p>
                    </div>
                `;
                reviewContainer.appendChild(div);
            });
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            userAnswers = [];
            document.getElementById('resultScreen').classList.add('d-none');
            document.getElementById('startScreen').classList.remove('d-none');
        }
    </script>
</body>
</html>
