<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 IPO 追蹤器 | HK IPO Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hk-dark: #0a0f1a;
            --hk-card: #111827;
            --hk-accent: #3b82f6;
            --hk-gold: #fbbf24;
            --hk-green: #22c55e;
            --hk-red: #ef4444;
            --ai-purple: #8b5cf6;
            --ai-pink: #d946ef;
        }
        * { font-family: 'Noto Sans HK', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--hk-dark) 0%, #1e3a5f 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        .navbar {
            background: rgba(10, 15, 26, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .card {
            background: var(--hk-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .card-header {
            background: rgba(59, 130, 246, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }
        .ipo-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ipo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.25);
        }
        .price-up { color: var(--hk-green); }
        .price-down { color: var(--hk-red); }
        .ai-badge {
            background: linear-gradient(135deg, var(--ai-purple), var(--ai-pink));
        }
        .section-title {
            border-left: 4px solid var(--hk-accent);
            padding-left: 12px;
        }
        .heat-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .heat-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--hk-gold), #f97316);
            border-radius: 3px;
        }
        .analysis-card {
            border-left: 3px solid var(--ai-purple);
        }
        .pros { color: var(--hk-green); }
        .cons { color: var(--hk-red); }
        .real-ipo { border-left: 3px solid var(--hk-green); }
        .upcoming-ipo { border-left: 3px solid var(--hk-gold); }
        .data-source {
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .price-loading {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .last-updated {
            font-size: 0.75rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-graph-up-arrow me-2"></i>IPO 追蹤器
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="#upcoming"><i class="bi bi-calendar-event me-1"></i>新股</a>
                <a class="nav-link" href="#grey-market"><i class="bi bi-moon-stars me-1"></i>暗盘</a>
                <a class="nav-link" href="#holdings"><i class="bi bi-wallet2 me-1"></i>持仓</a>
                <a class="nav-link" href="#ai-analysis"><span class="badge ai-badge">AI</span> 分析</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Header with Timestamp -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h5 class="mb-0"><i class="bi bi-clock me-1"></i>暗盤行情</h5>
                <small class="last-updated">最後更新：<span id="last-updated">載入中...</span></small>
            </div>
            <button class="btn btn-sm btn-outline-primary" onclick="refreshPrices()">
                <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
        </div>

        <!-- Stats Bar -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-white">30</h3>
                        <small class="text-secondary">本年新股</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-white">$100.5B</h3>
                        <small class="text-secondary">集资总额</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-warning">5</h3>
                        <small class="text-secondary">本月上市</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-success">+24</h3>
                        <small class="text-secondary">首日上涨</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grey Market Table with Real Prices -->
        <section id="grey-market" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-moon-stars me-2"></i>實時暗盤行情</h4>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th>股票</th>
                                <th>發行價</th>
                                <th>暗盤價</th>
                                <th>升跌</th>
                                <th>升跌幅</th>
                                <th>上市日</th>
                            </tr>
                        </thead>
                        <tbody id="grey-market-table">
                            <tr><td colspan="6" class="text-center py-4"><i class="bi bi-hourglass-split price-loading"></i> 載入價格中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <p class="data-source mt-2">
                <i class="bi bi-info-circle me-1"></i>
                價格由 Yahoo Finance 提供 · 僅供參考
            </p>
        </section>

        <!-- Holdings -->
        <section id="holdings" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-wallet2 me-2"></i>我的持仓</h4>
            <div class="row g-3" id="holdings-list"></div>
        </section>

        <!-- AI Analysis -->
        <section id="ai-analysis" class="mb-5">
            <h4 class="section-title mb-3">
                <span class="badge ai-badge me-2"><i class="bi bi-stars"></i> AI</span>
                智能分析
            </h4>
            <div class="card" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(217, 70, 239, 0.08)); border: 1px solid rgba(139, 92, 246, 0.3);">
                <div class="card-body">
                    <h5 class="mb-3"><i class="bi bi-robot me-2"></i>IPO AI 助手</h5>
                    
                    <!-- Stock Selector -->
                    <div class="mb-3">
                        <label class="form-label text-secondary small">选择新股：</label>
                        <div id="stock-chips" class="d-flex flex-wrap gap-2">
                            <span class="stock-chip active" data-stock="1021">🤖 華沿機器人 01021</span>
                            <span class="stock-chip" data-stock="2729">📦 凱樂士科技 02729</span>
                            <span class="stock-chip" data-stock="2632">🚗 澤景股份 02632</span>
                            <span class="stock-chip" data-stock="3355">💻 飛速創新 03355</span>
                        </div>
                    </div>

                    <!-- Analysis Results -->
                    <div id="ai-analysis-content">
                        <div class="analysis-card p-3 mb-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge ai-badge me-2"><i class="bi bi-fire"></i></span>
                                <strong id="ai-stock-name">華沿機器人 (01021.HK)</strong>
                            </div>
                            <div id="heat-content"></div>
                        </div>
                        
                        <div class="analysis-card p-3 mb-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-success me-2"><i class="bi bi-lightbulb"></i></span>
                                <strong>认购建议</strong>
                            </div>
                            <div id="advice-content"></div>
                        </div>
                        
                        <div class="analysis-card p-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-danger me-2"><i class="bi bi-exclamation-triangle"></i></span>
                                <strong>风险提示</strong>
                            </div>
                            <div id="risk-content"></div>
                        </div>
                    </div>

                    <!-- Custom Query -->
                    <div class="mt-3 pt-3 border-top border-secondary">
                        <label class="form-label text-secondary small">问 AI 问题：</label>
                        <div class="input-group">
                            <input type="text" class="form-control form-control-sm bg-dark text-white border-secondary" 
                                   id="ai-query" placeholder="例如：華沿機器人值得认购吗？">
                            <button class="btn btn-sm btn-primary" onclick="askAI()">
                                <i class="bi bi-send"></i>
                            </button>
                        </div>
                        <div id="ai-answer" class="mt-2 p-2" style="background: rgba(0,0,0,0.3); border-radius: 8px; white-space: pre-wrap; display: none;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Upcoming IPOs -->
        <section id="upcoming" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-calendar-event me-2"></i>即將上市新股</h4>
            <div class="row g-3" id="upcoming-ipo-list"></div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-secondary py-4">
            <small>📈 IPO 追蹤器 | 僅供參考，不構成投資建議</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // IPO Data
        const ipoData = [
            {
                code: '1021',
                name: '華沿機器人',
                nameEn: 'Huayan Robotics',
                issuePrice: 5.50,
                lots: 2,
                status: '🔥 今日暗盘!',
                heat: 95,
                industry: 'AI/机器人',
                icon: '🤖',
                listingDate: '2026-03-28',
                heatText: '🔥🔥🔥🔥🔥 (5/5) 今日暗盘！极高热度',
                pros: ['AI/机器人概念，当前市场最热板块', '保荐人背景强劲', '公开发售反应热烈'],
                cons: ['行业竞争激烈', '估值偏高'],
                advice: '今日暗盘！关注开盘价。若涨幅 <15% 可考虑持有。'
            },
            {
                code: '2729',
                name: '凱樂士科技',
                nameEn: 'Galaxis Tech',
                issuePrice: 18.20,
                lots: 0,
                status: '已上市',
                heat: 68,
                industry: '物流/自動化',
                icon: '📦',
                listingDate: '2026-03-24',
                heatText: '🔥🔥🔥 (3/5) 热度中等',
                pros: ['物流自动化赛道', '国策支持'],
                cons: ['集资规模较大', '竞争加剧'],
                advice: '暗盘表现平稳，观望为主。'
            },
            {
                code: '2632',
                name: '澤景股份',
                nameEn: 'New Vision Auto',
                issuePrice: 45.00,
                lots: 0,
                status: '已上市',
                heat: 72,
                industry: '汽車電子',
                icon: '🚗',
                listingDate: '2026-03-24',
                heatText: '🔥🔥🔥🔥 (4/5) 热度较高',
                pros: ['新能源车概念', '市场份额领先'],
                cons: ['行业周期性强', '毛利率承压'],
                advice: '汽车电子赛道，可关注。'
            },
            {
                code: '3355',
                name: '飛速創新',
                nameEn: 'Fs Com',
                issuePrice: 38.00,
                lots: 0,
                status: '已上市',
                heat: 78,
                industry: '軟件服務',
                icon: '💻',
                listingDate: '2026-03-23',
                heatText: '🔥🔥🔥🔥 (4/5) 热度较高',
                pros: ['网络解决方案龙头', '业绩增长稳定'],
                cons: ['估值偏高', '应收账款较高'],
                advice: '业绩稳健，可长线持有。'
            }
        ];

        // Holdings - Ray's actual holdings
        const holdingsData = [
            { code: '1021', name: '華沿機器人', lots: 2, avgCost: 5.50 }
        ];

        // Stock data for Yahoo Finance
        // Note: 1021.HK is grey market today (2026-03-27), Yahoo may not have live price yet
        const stockSymbols = {
            '1021': { symbol: '1021.HK', name: '華沿機器人', issuePrice: 5.50, isGreyMarket: true },
            '2729': { symbol: '2729.HK', name: '凱樂士科技', issuePrice: 18.20, isGreyMarket: false },
            '2632': { symbol: '2632.HK', name: '澤景股份', issuePrice: 45.00, isGreyMarket: false },
            '3355': { symbol: '3355.HK', name: '飛速創新', issuePrice: 38.00, isGreyMarket: false }
        };

        let stockPrices = {};
        let currentStock = '1021';

        // Direct Yahoo Finance fetch (works from browser)
        async function fetchYahooPrice(symbol) {
            try {
                // Try Yahoo Finance chart API
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`;
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                
                if (!response.ok) {
                    // Fallback to try query2
                    const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`;
                    const response2 = await fetch(url2, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0'
                        }
                    });
                    if (!response2.ok) throw new Error('Yahoo rate limited');
                    const data2 = await response2.json();
                    return parseYahooChart(data2, symbol);
                }
                
                const data = await response.json();
                return parseYahooChart(data, symbol);
                
            } catch (error) {
                console.error(`Failed to fetch ${symbol}:`, error);
                return null;
            }
        }
        
        function parseYahooChart(data, symbol) {
            try {
                const result = data.chart?.result?.[0];
                if (!result) return null;
                
                const meta = result.meta;
                const quote = result.indicators?.quote?.[0];
                
                // Get the last close price
                const closes = quote?.close || [];
                const lastClose = closes[closes.length - 1];
                const prevClose = meta.previousClose || lastClose;
                
                return {
                    price: meta.regularMarketPrice || lastClose || prevClose,
                    change: meta.regularMarketChange || 0,
                    changePercent: meta.regularMarketChangePercent || 0,
                    marketTime: meta.regularMarketTime
                };
            } catch (e) {
                console.error('Parse error:', e);
                return null;
            }
        }

        // Fetch all prices
        async function fetchAllPrices() {
            document.getElementById('last-updated').textContent = '載入中...';
            document.getElementById('grey-market-table').innerHTML = 
                '<tr><td colspan="6" class="text-center py-4"><i class="bi bi-hourglass-split price-loading"></i> 載入價格中...</td></tr>';
            
            const promises = Object.keys(stockSymbols).map(async (code) => {
                const stock = stockSymbols[code];
                const data = await fetchYahooPrice(stock.symbol);
                if (data) {
                    stockPrices[code] = {
                        ...data,
                        issuePrice: stock.issuePrice,
                        name: stock.name
                    };
                }
            });

            await Promise.all(promises);
            
            renderPrices();
            
            // Update timestamp
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-HK', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            const dateStr = now.toLocaleDateString('zh-HK', {
                month: '2-digit',
                day: '2-digit'
            });
            document.getElementById('last-updated').textContent = `${dateStr} ${timeStr}`;
        }

        function renderPrices() {
            const tbody = document.getElementById('grey-market-table');
            
            tbody.innerHTML = Object.keys(stockSymbols).map(code => {
                const stock = stockSymbols[code];
                const priceData = stockPrices[code];
                const ipo = ipoData.find(i => i.code === code);
                
                // Grey market stocks (not yet listed) - show issue price and "暗盘"
                if (stock.isGreyMarket) {
                    return `<tr>
                        <td>
                            <span class="badge bg-primary">${stock.symbol}</span>
                            <strong>${stock.name}</strong>
                            ${code === '1021' ? '<span class="badge bg-warning text-dark ms-1">2手</span>' : ''}
                        </td>
                        <td>HK$${stock.issuePrice.toFixed(2)}</td>
                        <td colspan="4" class="text-warning">
                            <i class="bi bi-moon-stars"></i> 🔥 今日暗盘! 发行价: HK$${stock.issuePrice.toFixed(2)}
                        </td>
                    </tr>`;
                }
                
                // Listed stocks - show live price
                if (!priceData || !priceData.price) {
                    return `<tr>
                        <td><span class="badge bg-primary">${stock.symbol}</span> <strong>${stock.name}</strong></td>
                        <td>HK$${stock.issuePrice.toFixed(2)}</td>
                        <td colspan="4" class="text-muted"><i class="bi bi-hourglass"></i> 無法載入</td>
                    </tr>`;
                }

                const change = priceData.price - stock.issuePrice;
                const changePercent = (change / stock.issuePrice) * 100;
                const isUp = change >= 0;
                const cls = isUp ? 'price-up' : 'price-down';
                const changeStr = isUp ? `+${change.toFixed(2)}` : change.toFixed(2);
                const percentStr = isUp ? `+${changePercent.toFixed(2)}%` : `${changePercent.toFixed(2)}%`;

                return `<tr>
                    <td>
                        <span class="badge bg-primary">${stock.symbol}</span>
                        <strong>${stock.name}</strong>
                    </td>
                    <td>HK$${stock.issuePrice.toFixed(2)}</td>
                    <td class="fw-bold ${cls}">HK$${priceData.price.toFixed(2)}</td>
                    <td class="${cls}">${changeStr}</td>
                    <td class="${cls}">${percentStr}</td>
                    <td>${ipo ? ipo.listingDate : '-'}</td>
                </tr>`;
            }).join('');
        }

        function refreshPrices() {
            fetchAllPrices();
        }

        // Holdings
        function renderHoldings() {
            const el = document.getElementById('holdings-list');
            if (!holdingsData.length) { 
                el.innerHTML = '<div class="col-12 text-center text-secondary py-4"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无持仓</p></div>'; 
                return; 
            }
            
            el.innerHTML = holdingsData.map(h => {
                const priceData = stockPrices[h.code];
                const currentPrice = priceData ? `HK$${priceData.price.toFixed(2)}` : '載入中...';
                const pnl = priceData ? ((priceData.price - h.avgCost) / h.avgCost * 100).toFixed(1) : '--';
                const pnlClass = priceData && priceData.price >= h.avgCost ? 'text-success' : 'text-danger';
                const pnlPrefix = priceData && priceData.price >= h.avgCost ? '+' : '';
                
                return `<div class="col-md-6 col-lg-4">
                    <div class="card border-warning border-2">
                        <div class="card-header d-flex justify-content-between">
                            <strong>🤖 ${h.name}</strong>
                            <span class="badge bg-warning text-dark">${h.lots} 手</span>
                        </div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-4"><small class="text-secondary">成本</small><br><strong>HK$${h.avgCost.toFixed(2)}</strong></div>
                                <div class="col-4"><small class="text-secondary">当前</small><br><strong>${currentPrice}</strong></div>
                                <div class="col-4"><small class="text-secondary">盈亏</small><br><strong class="${pnlClass}">${pnlPrefix}${pnl}%</strong></div>
                            </div>
                        </div>
                        <div class="card-footer text-center bg-dark bg-opacity-50">
                            <small class="text-danger fw-bold"><i class="bi bi-calendar-event"></i> 🔥 今日暗盘!</small>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // AI Analysis
        function renderAIAnalysis(stockCode) {
            const data = ipoData.find(s => s.code === stockCode) || ipoData[0];
            const priceData = stockPrices[stockCode];
            
            document.getElementById('ai-stock-name').textContent = `${data.name} (${data.code}21.HK)`;
            
            let priceInfo = '';
            if (priceData) {
                const change = priceData.price - data.issuePrice;
                const changePercent = (change / data.issuePrice) * 100;
                const isUp = change >= 0;
                const cls = isUp ? 'price-up' : 'price-down';
                priceInfo = `<div class="mb-2">
                    <span class="${cls} fw-bold">暗盤價：HK$${priceData.price.toFixed(2)} (${isUp ? '+' : ''}${changePercent.toFixed(1)}%)</span>
                </div>`;
            }
            
            document.getElementById('heat-content').innerHTML = `
                ${priceInfo}
                <p class="mb-2">${data.heatText}</p>
                <div class="small">
                    <div class="mb-1"><strong class="text-secondary">發行價：</strong>HK$${data.issuePrice.toFixed(2)}</div>
                    <div class="mb-1"><strong class="text-secondary">行業：</strong>${data.industry}</div>
                    <div class="mb-1"><strong class="text-secondary">上市日期：</strong>${data.listingDate}</div>
                    <div><strong class="text-secondary">狀態：</strong><span class="badge ${data.lots > 0 ? 'bg-warning text-dark' : 'bg-secondary'}">${data.status}</span></div>
                </div>`;
            
            document.getElementById('advice-content').innerHTML = `
                <p class="mb-2">${data.advice}</p>
                <div class="small">
                    <strong class="pros"><i class="bi bi-plus-circle"></i> 利好因素：</strong>
                    <ul class="mb-2">${data.pros.map(p => `<li>${p}</li>`).join('')}</ul>
                    <strong class="cons"><i class="bi bi-dash-circle"></i> 利空因素：</strong>
                    <ul class="mb-0">${data.cons.map(c => `<li>${c}</li>`).join('')}</ul>
                </div>`;
            
            document.getElementById('risk-content').innerHTML = `
                <ul class="mb-0 small">
                    ${data.cons.map(c => `<li class="text-danger">${c}</li>`).join('')}
                    <li class="text-secondary">以上分析仅供参考，不构成投资建议</li>
                </ul>`;
        }

        // Stock chip selection
        document.querySelectorAll('.stock-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.stock-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentStock = chip.dataset.stock;
                renderAIAnalysis(currentStock);
            });
        });

        // Ask AI
        function askAI() {
            const query = document.getElementById('ai-query').value.trim();
            if (!query) return;
            
            const answerEl = document.getElementById('ai-answer');
            answerEl.style.display = 'block';
            answerEl.innerHTML = '<span class="text-secondary"><i class="bi bi-hourglass-split"></i> AI 分析中...</span>';
            
            setTimeout(() => {
                const data = ipoData.find(s => s.code === currentStock) || ipoData[0];
                const priceData = stockPrices[currentStock];
                
                let priceContext = '';
                if (priceData) {
                    const change = priceData.price - data.issuePrice;
                    const changePercent = (change / data.issuePrice) * 100;
                    priceContext = `目前暗盤價 HK$${priceData.price.toFixed(2)}，較發行價 ${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(1)}%。`;
                }
                
                const responses = [
                    `${data.name}（${data.code}21.HK）分析：

${priceContext}

行業：${data.industry}
熱度：${data.heatText}

認購建議：
${data.advice}

⚠️ 風險提示：以上分析僅供參考，請根據個人風險承受能力做出投資決定。`,
                    `關於 ${data.name}（${data.code}21.HK）：

✅ 利好因素：
${data.pros.map(p => '• ' + p).join('\n')}

⚠️ 利空因素：
${data.cons.map(c => '• ' + c).join('\n')}

${priceContext}

💡 綜合建議：${data.advice}`
                ];
                
                answerEl.innerHTML = responses[Math.floor(Math.random() * responses.length)];
                document.getElementById('ai-query').value = '';
            }, 1500);
        }

        // Upcoming IPOs
        function renderUpcomingIPOs() {
            const upcoming = ipoData.filter(ipo => ipo.status.includes('招股') || ipo.status.includes('截止'));
            const container = document.getElementById('upcoming-ipo-list');
            
            if (upcoming.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-secondary py-4"><i class="bi bi-calendar-check fs-1"></i><p class="mt-2">目前無正在招股的新股</p></div>';
                return;
            }
            
            container.innerHTML = upcoming.map(ipo => `
                <div class="col-md-6 col-lg-4">
                    <div class="card ipo-card h-100 upcoming-ipo">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <div>
                                    <span class="badge bg-primary">${ipo.code}21.HK</span>
                                    <h5 class="mt-2 mb-0">${ipo.icon} ${ipo.name}</h5>
                                    <small class="text-secondary">${ipo.nameEn}</small>
                                </div>
                                <span class="badge ${ipo.status.includes('截止') ? 'bg-danger' : 'bg-warning text-dark'}">${ipo.status}</span>
                            </div>
                            <div class="mt-3">
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-secondary">發行價</small><span>HK$${ipo.issuePrice.toFixed(2)}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-secondary">行業</small><span>${ipo.industry}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-secondary">上市日</small><span>${ipo.listingDate}</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-secondary">熱度</small>
                                    <div class="heat-bar" style="width:80px">
                                        <div class="heat-fill" style="width:${ipo.heat}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderHoldings();
            renderUpcomingIPOs();
            renderAIAnalysis('1021');
            fetchAllPrices();
        });
    </script>
</body>
</html>
