<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 IPO 追蹤器 | HK IPO Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hk-dark: #0a0f1a;
            --hk-card: #111827;
            --hk-accent: #3b82f6;
            --hk-gold: #fbbf24;
            --hk-green: #22c55e;
            --hk-red: #ef4444;
            --ai-purple: #8b5cf6;
            --ai-pink: #d946ef;
        }
        * { font-family: 'Noto Sans HK', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--hk-dark) 0%, #1e3a5f 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .navbar {
            background: rgba(10, 15, 26, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .card {
            background: var(--hk-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .card-header {
            background: rgba(59, 130, 246, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }
        .ipo-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ipo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.25);
        }
        .price-up { color: var(--hk-green); }
        .price-down { color: var(--hk-red); }
        .ai-badge {
            background: linear-gradient(135deg, var(--ai-purple), var(--ai-pink));
        }
        .section-title {
            border-left: 4px solid var(--hk-accent);
            padding-left: 12px;
        }
        .heat-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .heat-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--hk-gold), #f97316);
            border-radius: 3px;
        }
        .analysis-card {
            border-left: 3px solid var(--ai-purple);
        }
        .pros { color: var(--hk-green); }
        .cons { color: var(--hk-red); }
        .real-ipo { border-left: 3px solid var(--hk-green); }
        .upcoming-ipo { border-left: 3px solid var(--hk-gold); }
        .data-source {
            font-size: 0.75rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-graph-up-arrow me-2"></i>IPO 追蹤器
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="#upcoming"><i class="bi bi-calendar-event me-1"></i>新股</a>
                <a class="nav-link" href="#grey-market"><i class="bi bi-moon-stars me-1"></i>暗盘</a>
                <a class="nav-link" href="#holdings"><i class="bi bi-wallet2 me-1"></i>持仓</a>
                <a class="nav-link" href="#ai-analysis"><span class="badge ai-badge">AI</span> 分析</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Stats Bar -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-white">30</h3>
                        <small class="text-muted">本年新股</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-white">$100.5B</h3>
                        <small class="text-muted">集资总额</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-warning">5</h3>
                        <small class="text-muted">本月上市</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="card-body p-0">
                        <h3 class="mb-0 text-success">+24</h3>
                        <small class="text-muted">首日上涨</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Upcoming IPOs -->
        <section id="upcoming" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-calendar-event me-2"></i>即將上市新股</h4>
            <p class="data-source mb-2">數據來源：HKEX、A ASTOCKS（更新日期：2026-03-22）</p>
            <div class="row g-3" id="upcoming-ipo-list"></div>
        </section>

        <!-- Grey Market -->
        <section id="grey-market" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-moon-stars me-2"></i>暗盤行情</h4>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th>股票</th>
                                <th>暗盘价</th>
                                <th>暗盘涨跌</th>
                                <th>发行价</th>
                                <th>升跌幅</th>
                                <th>上市日</th>
                            </tr>
                        </thead>
                        <tbody id="grey-market-table"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Holdings -->
        <section id="holdings" class="mb-5">
            <h4 class="section-title mb-3"><i class="bi bi-wallet2 me-2"></i>我的持仓</h4>
            <div class="row g-3" id="holdings-list"></div>
        </section>

        <!-- AI Analysis -->
        <section id="ai-analysis" class="mb-5">
            <h4 class="section-title mb-3">
                <span class="badge ai-badge me-2"><i class="bi bi-stars"></i> AI</span>
                智能分析
            </h4>
            <div class="card" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(217, 70, 239, 0.08)); border: 1px solid rgba(139, 92, 246, 0.3);">
                <div class="card-body">
                    <h5 class="mb-3"><i class="bi bi-robot me-2"></i>IPO AI 助手</h5>
                    
                    <!-- Stock Selector -->
                    <div class="mb-3">
                        <label class="form-label text-muted small">选择新股：</label>
                        <div id="stock-chips" class="d-flex flex-wrap gap-2">
                            <span class="stock-chip active" data-stock="01021">🤖 華沿機器人 01021</span>
                            <span class="stock-chip" data-stock="02726">📊 瀚天天成 02726</span>
                            <span class="stock-chip" data-stock="06636">👁️ 極視角 06636</span>
                        </div>
                    </div>

                    <!-- Analysis Results -->
                    <div id="ai-analysis-content">
                        <div class="analysis-card p-3 mb-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge ai-badge me-2"><i class="bi bi-fire"></i></span>
                                <strong id="ai-stock-name">華沿機器人 (01021.HK)</strong>
                            </div>
                            <div id="heat-content"></div>
                        </div>
                        
                        <div class="analysis-card p-3 mb-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-success me-2"><i class="bi bi-lightbulb"></i></span>
                                <strong>认购建议</strong>
                            </div>
                            <div id="advice-content"></div>
                        </div>
                        
                        <div class="analysis-card p-3" style="background: rgba(0,0,0,0.3); border-radius: 8px;">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-danger me-2"><i class="bi bi-exclamation-triangle"></i></span>
                                <strong>风险提示</strong>
                            </div>
                            <div id="risk-content"></div>
                        </div>
                    </div>

                    <!-- Custom Query -->
                    <div class="mt-3 pt-3 border-top border-secondary">
                        <label class="form-label text-muted small">问 AI 问题：</label>
                        <div class="input-group">
                            <input type="text" class="form-control form-control-sm bg-dark text-light border-secondary" 
                                   id="ai-query" placeholder="例如：華沿機器人值得认购吗？">
                            <button class="btn btn-sm btn-primary" onclick="askAI()">
                                <i class="bi bi-send"></i>
                            </button>
                        </div>
                        <div id="ai-answer" class="mt-2 p-2" style="background: rgba(0,0,0,0.3); border-radius: 8px; white-space: pre-wrap; display: none;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-muted py-4">
            <small>📈 IPO 追蹤器 | 數據來源：公開市場資料 | 僅供參考，不構成投資建議</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Real IPO Data (sourced from HKEX, AASTOCKS - 2026-03-22)
        const ipoData = [
            {
                code: '01021',
                name: '華沿機器人',
                nameEn: 'Huayan Robotics',
                price: 'HK$5.50',
                lots: 2,
                status: '明天暗盘',
                heat: 92,
                industry: 'AI/机器人',
                icon: '🤖',
                listingDate: '2026-03-28',
                heatText: '🔥🔥🔥🔥🔥 (5/5) 极高热度，AI概念加持',
                pros: ['AI/机器人概念，当前市场最热板块', '保荐人背景强劲', '公开发售反应热烈', '集资规模适中(约2亿美金)'],
                cons: ['行业竞争激烈', '估值偏高', '依赖单一市场'],
                advice: '建议积极认购，明天暗盘关注开盘价与发行价差距。若涨幅 <15% 可考虑持有。'
            },
            {
                code: '02726',
                name: '瀚天天成',
                nameEn: 'Hantian Tech',
                price: 'HK$76.26',
                lots: 0,
                status: '即将上市',
                heat: 68,
                industry: '半导体',
                icon: '💎',
                listingDate: '2026-03-30',
                heatText: '🔥🔥🔥 (3/5) 热度中等',
                pros: ['半导体国产替代概念', '碳化硅材料龙头'],
                cons: ['行业周期性较强', '近期板块走势疲软'],
                advice: '谨慎认购，关注定价。'
            },
            {
                code: '06636',
                name: '極視角',
                nameEn: 'Extreme Vision',
                price: 'HK$40.00',
                lots: 0,
                status: '即将上市',
                heat: 72,
                industry: 'AI/计算机视觉',
                icon: '👁️',
                listingDate: '2026-03-30',
                heatText: '🔥🔥🔥🔥 (4/5) 热度较高',
                pros: ['AI视觉概念', '市场份额领先'],
                cons: ['竞争加剧', '技术迭代风险'],
                advice: 'AI概念持续，可考虑认购。'
            },
            {
                code: '02526',
                name: '德適-B',
                nameEn: 'Debut Bio',
                price: '待定',
                lots: 0,
                status: '即将上市',
                heat: 55,
                industry: '生物科技',
                icon: '🧬',
                listingDate: '2026-03-30',
                heatText: '🔥🔥 (2/5) 热度较低',
                pros: ['创新器械', '医疗器械赛道'],
                cons: ['研发风险大', '商业化进度慢'],
                advice: '高风险标的，观望为主。'
            }
        ];

        // Real Grey Market Data (2026-03-22)
        const greyMarketData = [
            { code: '01021', name: '華沿機器人', greyPrice: '待暗盘', change: '明天(3/27)暗盘', issuePrice: 'HK$5.50', spread: '-', listingDate: '03/28' },
            { code: '02729', name: '凱樂士科技', greyPrice: 'HK$18.50', change: '+10.1%', issuePrice: 'HK$16.40-20.40', spread: '+10.1%', listingDate: '03/24' },
            { code: '02632', name: '澤景股份', greyPrice: 'HK$46.00', change: '-2.1%', issuePrice: 'HK$42-48', spread: '-2.1%', listingDate: '03/24' },
            { code: '03355', name: '飛速創新', greyPrice: 'HK$39.80', change: '+5.0%', issuePrice: 'HK$35.20-41.60', spread: '+5.0%', listingDate: '03/23' }
        ];

        // Holdings - Ray's actual holdings
        const holdingsData = [
            { code: '01021', name: '華沿機器人', lots: 2, avgCost: 5.50, currentPrice: '待暗盘' }
        ];

        let currentStock = '01021';

        function renderIPOs() {
            document.getElementById('upcoming-ipo-list').innerHTML = ipoData.map(ipo => `
                <div class="col-md-6 col-lg-6">
                    <div class="card ipo-card h-100 ${ipo.code === '01021' ? 'border-warning border-2 real-ipo' : 'upcoming-ipo'}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <div>
                                    <span class="badge bg-primary">${ipo.code}.HK</span>
                                    <h5 class="mt-2 mb-0">${ipo.icon} ${ipo.name}</h5>
                                    <small class="text-muted">${ipo.nameEn}</small>
                                </div>
                                <span class="badge ${ipo.lots > 0 ? 'bg-warning text-dark' : ipo.status.includes('暗盘') ? 'bg-danger' : 'bg-secondary'}">${ipo.status}</span>
                            </div>
                            <div class="mt-3">
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-muted">发行价</small><span>${ipo.price}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-muted">行业</small><span>${ipo.industry}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <small class="text-muted">上市日</small><span>${ipo.listingDate}</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">热度</small>
                                    <div class="heat-bar" style="width:80px">
                                        <div class="heat-fill" style="width:${ipo.heat}%"></div>
                                    </div>
                                </div>
                            </div>
                            ${ipo.lots > 0 ? `<div class="mt-2 pt-2 border-top"><small class="text-success"><i class="bi bi-check-circle"></i> 你中了 ${ipo.lots} 手</small></div>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderGreyMarket() {
            document.getElementById('grey-market-table').innerHTML = greyMarketData.map(s => {
                const isUp = s.change.startsWith('+');
                const isPending = s.change.includes('待') || s.change.includes('明天');
                const cls = isPending ? 'text-muted' : (isUp ? 'price-up' : 'price-down');
                return `<tr>
                    <td><span class="badge bg-primary me-2">${s.code}</span><strong>${s.name}</strong></td>
                    <td><strong>${s.greyPrice}</strong></td>
                    <td class="${cls}">${s.change}</td>
                    <td>${s.issuePrice}</td>
                    <td class="${cls}">${s.spread}</td>
                    <td>${s.listingDate}</td>
                </tr>`;
            }).join('');
        }

        function renderHoldings() {
            const el = document.getElementById('holdings-list');
            if (!holdingsData.length) { el.innerHTML = '<div class="col-12 text-center text-muted py-4"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无持仓</p></div>'; return; }
            el.innerHTML = holdingsData.map(h => `
                <div class="col-md-6 col-lg-4">
                    <div class="card border-warning border-2">
                        <div class="card-header d-flex justify-content-between">
                            <strong>${h.name}</strong>
                            <span class="badge bg-warning text-dark">${h.lots} 手</span>
                        </div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-4"><small class="text-muted">成本</small><br><strong>HK$${h.avgCost.toFixed(2)}</strong></div>
                                <div class="col-4"><small class="text-muted">当前</small><br><strong>${h.currentPrice}</strong></div>
                                <div class="col-4"><small class="text-muted">盈亏</small><br><strong class="text-warning">--</strong></div>
                            </div>
                        </div>
                        <div class="card-footer text-center bg-dark bg-opacity-50">
                            <small class="text-warning"><i class="bi bi-calendar-event"></i> 明天(3/27)暗盘</small>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAIAnalysis(stockCode) {
            const data = ipoData.find(s => s.code === stockCode) || ipoData[0];
            const a = data;
            
            document.getElementById('ai-stock-name').textContent = `${data.name} (${data.code}.HK)`;
            
            document.getElementById('heat-content').innerHTML = `
                <p class="mb-2">${a.heatText}</p>
                <div class="small">
                    <div class="mb-1"><strong class="text-muted">发行价：</strong>${data.price}</div>
                    <div class="mb-1"><strong class="text-muted">行业：</strong>${data.industry}</div>
                    <div class="mb-1"><strong class="text-muted">上市日期：</strong>${data.listingDate}</div>
                    <div><strong class="text-muted">状态：</strong><span class="badge ${data.lots > 0 ? 'bg-warning text-dark' : 'bg-secondary'}">${data.status}</span></div>
                </div>`;
            
            document.getElementById('advice-content').innerHTML = `
                <p class="mb-2">${a.advice}</p>
                <div class="small">
                    <strong class="pros"><i class="bi bi-plus-circle"></i> 利好因素：</strong>
                    <ul class="mb-2">${a.pros.map(p => `<li>${p}</li>`).join('')}</ul>
                    <strong class="cons"><i class="bi bi-dash-circle"></i> 利空因素：</strong>
                    <ul class="mb-0">${a.cons.map(c => `<li>${c}</li>`).join('')}</ul>
                </div>`;
            
            document.getElementById('risk-content').innerHTML = `
                <ul class="mb-0 small">
                    ${a.cons.map(c => `<li class="text-danger">${c}</li>`).join('')}
                    <li class="text-muted">以上分析仅供参考，不构成投资建议</li>
                </ul>`;
        }

        // Stock chip selection
        document.querySelectorAll('.stock-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.stock-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentStock = chip.dataset.stock;
                renderAIAnalysis(currentStock);
            });
        });

        // Ask AI
        function askAI() {
            const query = document.getElementById('ai-query').value.trim();
            if (!query) return;
            
            const answerEl = document.getElementById('ai-answer');
            answerEl.style.display = 'block';
            answerEl.innerHTML = '<span class="text-muted">AI 分析中...</span>';
            
            // Simulated AI response
            setTimeout(() => {
                const data = ipoData.find(s => s.code === currentStock) || ipoData[0];
                const responses = [
                    `根據市場數據，${data.name}（${data.code}.HK）暗盤表現值得期待。

分析重點：
• ${data.industry} 概念持續發酵
• 發行價 ${data.price}，集資規模適中
• 熱度指數 ${data.heat}/100

操作建議：
• 若暗盤漲幅 <15%：可考慮持有
• 若漲幅 15-30%：分批獲利
• 若漲幅 >30%：注意回調風險

⚠️ 風險提示：以上分析僅供參考，請根據個人風險承受能力做出投資決定。`,
                    `關於 ${data.name}（${data.code}.HK）的认购建议：

✅ 利好因素：
${data.pros.map(p => '• ' + p).join('\n')}

⚠️ 利空因素：
${data.cons.map(c => '• ' + c).join('\n')}

💡 綜合建議：${data.advice}`
                ];
                answerEl.innerHTML = responses[Math.floor(Math.random() * responses.length)];
                document.getElementById('ai-query').value = '';
            }, 1500);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderIPOs();
            renderGreyMarket();
            renderHoldings();
            renderAIAnalysis('01021');
        });
    </script>
</body>
</html>
